<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>2048 — NEXUS ARCADE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://pyscript.net/releases/2024.1.1/core.css"
    />
    <script
      type="module"
      src="https://pyscript.net/releases/2024.1.1/core.js"
    ></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #05070d;
        --surface: #0b0f1c;
        --border: #1a2236;
        --border2: #243050;
        --accent: #00e87a;
        --text: #cdd8f0;
        --muted: #4a5878;
        --muted2: #7888a8;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Rajdhani", system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #loading {
        position: fixed;
        inset: 0;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        gap: 16px;
        transition: opacity 0.5s ease;
      }
      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 2px solid var(--border2);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .load-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        color: var(--muted2);
        letter-spacing: 2px;
      }
      .load-bar {
        width: 200px;
        height: 3px;
        background: var(--border2);
        border-radius: 2px;
        overflow: hidden;
      }
      .load-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 2px;
        animation: loadAnim 2s ease forwards;
      }
      @keyframes loadAnim {
        0% {
          width: 0%;
        }
        60% {
          width: 75%;
        }
        100% {
          width: 100%;
        }
      }
      #top-bar {
        width: 100%;
        max-width: 440px;
        padding: 14px 22px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid var(--border2);
        background: rgba(5, 7, 13, 0.8);
        backdrop-filter: blur(8px);
        position: sticky;
        top: 0;
        z-index: 10;
        opacity: 0;
        animation: fadeDown 0.4s 0.1s ease both;
      }
      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      #back-link {
        color: var(--muted2);
        text-decoration: none;
        font-size: 13px;
        font-family: "Share Tech Mono", monospace;
        transition: color 0.2s;
      }
      #back-link:hover {
        color: var(--accent);
      }
      .sep {
        color: var(--border2);
      }
      #page-title {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 1px;
      }
      #game-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 16px;
        gap: 14px;
        opacity: 0;
        animation: fadeUp 0.5s 0.15s ease both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      #hud {
        display: flex;
        gap: 6px;
        background: var(--surface);
        border: 1px solid var(--border2);
        border-radius: 10px;
        padding: 10px 6px;
      }
      .hud-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
        padding: 0 22px;
      }
      .hud-item + .hud-item {
        border-left: 1px solid var(--border2);
      }
      .hud-label {
        font-size: 10px;
        color: var(--muted2);
        letter-spacing: 2px;
        text-transform: uppercase;
        font-family: "Share Tech Mono", monospace;
      }
      .hud-val {
        font-size: 24px;
        font-weight: 700;
        color: var(--accent);
        font-family: "Share Tech Mono", monospace;
        line-height: 1;
      }
      canvas {
        display: block;
        border-radius: 14px;
        touch-action: none;
        border: 1px solid var(--border2);
        box-shadow: 0 0 30px rgba(0, 232, 122, 0.07);
      }
      #btns {
        display: flex;
        gap: 8px;
      }
      .btn {
        background: var(--surface);
        border: 1px solid var(--border2);
        border-radius: 9px;
        color: var(--text);
        padding: 9px 18px;
        font-size: 13px;
        cursor: pointer;
        font-family: "Rajdhani", sans-serif;
        font-weight: 600;
        letter-spacing: 0.5px;
        transition: all 0.2s;
      }
      .btn:hover {
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent), #00c06a);
        color: #000;
        font-weight: 700;
        border: none;
      }
      .btn-primary:hover {
        opacity: 0.88;
        color: #000;
      }
      .hint {
        font-size: 11px;
        color: var(--muted);
        text-align: center;
        font-family: "Share Tech Mono", monospace;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <div class="load-label">LOADING PYTHON</div>
      <div class="load-bar"><div class="load-fill"></div></div>
    </div>
    <div id="top-bar">
      <a id="back-link" href="index.html">← BACK</a><span class="sep">|</span
      ><span id="page-title">2048</span>
    </div>
    <div id="game-wrapper">
      <div id="hud">
        <div class="hud-item">
          <div class="hud-label">Score</div>
          <div class="hud-val" id="s-score">0</div>
        </div>
        <div class="hud-item">
          <div class="hud-label">Best</div>
          <div class="hud-val" id="s-best">0</div>
        </div>
      </div>
      <canvas id="gameCanvas" width="380" height="380"></canvas>
      <div id="btns">
        <button class="btn" id="undo-btn">↩ Undo</button>
        <button class="btn btn-primary" id="reset-btn">New Game</button>
      </div>
      <div class="hint">Arrow keys / WASD / swipe · U = undo</div>
    </div>

    <script type="py" src="game2048.py"></script>
  </body>
</html>
