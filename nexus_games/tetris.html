<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris — NEXUS ARCADE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://pyscript.net/releases/2024.1.1/core.css"
    />
    <script
      type="module"
      src="https://pyscript.net/releases/2024.1.1/core.js"
    ></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #05070d;
        --surface: #0b0f1c;
        --border: #1a2236;
        --border2: #243050;
        --accent: #00e87a;
        --text: #cdd8f0;
        --muted: #4a5878;
        --muted2: #7888a8;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Rajdhani", system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #loading {
        position: fixed;
        inset: 0;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        gap: 16px;
        transition: opacity 0.5s ease;
      }
      #loading.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .spinner {
        width: 40px;
        height: 40px;
        border: 2px solid var(--border2);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .load-label {
        font-family: "Share Tech Mono", monospace;
        font-size: 13px;
        color: var(--muted2);
        letter-spacing: 2px;
      }
      .load-bar {
        width: 200px;
        height: 3px;
        background: var(--border2);
        border-radius: 2px;
        overflow: hidden;
      }
      .load-fill {
        height: 100%;
        background: var(--accent);
        border-radius: 2px;
        animation: loadAnim 2s ease forwards;
      }
      @keyframes loadAnim {
        0% {
          width: 0%;
        }
        60% {
          width: 75%;
        }
        100% {
          width: 100%;
        }
      }
      #top-bar {
        width: 100%;
        max-width: 480px;
        padding: 14px 22px;
        display: flex;
        align-items: center;
        gap: 12px;
        border-bottom: 1px solid var(--border2);
        background: rgba(5, 7, 13, 0.8);
        backdrop-filter: blur(8px);
        position: sticky;
        top: 0;
        z-index: 10;
        opacity: 0;
        animation: fadeDown 0.4s 0.1s ease both;
      }
      @keyframes fadeDown {
        from {
          opacity: 0;
          transform: translateY(-8px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      #back-link {
        color: var(--muted2);
        text-decoration: none;
        font-size: 13px;
        font-family: "Share Tech Mono", monospace;
        letter-spacing: 0.5px;
        transition: color 0.2s;
      }
      #back-link:hover {
        color: var(--accent);
      }
      .sep {
        color: var(--border2);
        font-size: 12px;
      }
      #page-title {
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 1px;
      }
      #game-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px 16px;
        gap: 14px;
        opacity: 0;
        animation: fadeUp 0.5s 0.15s ease both;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      #game-area {
        display: flex;
        gap: 14px;
        align-items: flex-start;
      }
      canvas {
        display: block;
        border-radius: 10px;
        touch-action: none;
        border: 1px solid var(--border2);
      }
      #sidebar {
        display: flex;
        flex-direction: column;
        gap: 10px;
        min-width: 96px;
      }
      .stat-box {
        background: var(--surface);
        border: 1px solid var(--border2);
        border-radius: 10px;
        padding: 10px 12px;
        text-align: center;
      }
      .stat-label {
        font-size: 10px;
        color: var(--muted2);
        letter-spacing: 2px;
        text-transform: uppercase;
        font-family: "Share Tech Mono", monospace;
      }
      .stat-val {
        font-size: 20px;
        font-weight: 700;
        color: var(--accent);
        margin-top: 3px;
        font-family: "Share Tech Mono", monospace;
        line-height: 1;
      }
      #mobile-btns {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .mob-btn {
        background: var(--surface);
        border: 1px solid var(--border2);
        border-radius: 10px;
        color: var(--text);
        font-size: 18px;
        width: 54px;
        height: 50px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.1s;
      }
      .mob-btn:active {
        background: var(--accent);
        color: #000;
        transform: scale(0.92);
      }
      .hint {
        font-size: 11px;
        color: var(--muted);
        text-align: center;
        font-family: "Share Tech Mono", monospace;
        letter-spacing: 0.5px;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <div class="load-label">LOADING PYTHON</div>
      <div class="load-bar"><div class="load-fill"></div></div>
    </div>
    <div id="top-bar">
      <a id="back-link" href="index.html">← BACK</a><span class="sep">|</span
      ><span id="page-title">Tetris</span>
    </div>
    <div id="game-wrapper">
      <div id="game-area">
        <canvas id="gameCanvas" width="200" height="400"></canvas>
        <div id="sidebar">
          <div class="stat-box">
            <div class="stat-label">Score</div>
            <div class="stat-val" id="s-score">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Lines</div>
            <div class="stat-val" id="s-lines">0</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Level</div>
            <div class="stat-val" id="s-level">1</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Next</div>
            <canvas
              id="nextCanvas"
              width="84"
              height="84"
              style="
                border-radius: 6px;
                margin-top: 6px;
                border: 1px solid var(--border2);
              "
            ></canvas>
          </div>
        </div>
      </div>
      <div id="mobile-btns">
        <div class="mob-btn" id="mb-left">◀</div>
        <div class="mob-btn" id="mb-rot">↻</div>
        <div class="mob-btn" id="mb-right">▶</div>
        <div class="mob-btn" id="mb-down">▼</div>
        <div class="mob-btn" id="mb-drop">⬇</div>
      </div>
      <div class="hint">
        ← → move · ↑ rotate · ↓ soft · Space hard drop · P pause · R restart
      </div>
    </div>

    <script type="py" src="tetris.py"></script>
  </body>
</html>
