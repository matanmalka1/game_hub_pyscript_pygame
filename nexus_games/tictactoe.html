<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tic-Tac-Toe vs AI — PIXEL VAULT</title>
    <link
      rel="stylesheet"
      href="https://pyscript.net/releases/2024.1.1/core.css"
    />
    <script
      type="module"
      src="https://pyscript.net/releases/2024.1.1/core.js"
    ></script>
    <py-config>
      packages = ["numpy"]
      [[fetch]]
      files = ["tictactoe_core.py"]
    </py-config>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      :root {
        --bg: #07090f;
        --surface: #0d1120;
        --border: rgba(255,255,255,0.07);
        --accent: #00e5ff;
        --accent2: #ff4d6d;
        --text: #d4ddf0;
        --muted: #4a5570;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #loading {
        position: fixed;
        inset: 0;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        z-index: 100;
        gap: 14px;
        color: var(--text);
      }
      .spinner {
        width: 38px;
        height: 38px;
        border: 3px solid #333;
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      #top-bar {
        width: 100%;
        max-width: 520px;
        padding: 12px 20px;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid var(--border);
      }
      #back-link {
        color: var(--muted);
        text-decoration: none;
        font-size: 13px;
      }
      #back-link:hover {
        color: var(--accent);
      }
      #page-title {
        font-size: 15px;
        font-weight: 700;
        margin-left: 6px;
      }
      #game-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 20px;
        gap: 14px;
        width: 100%;
        max-width: 520px;
      }
      #gameCanvas {
        display: block;
        border-radius: 12px;
        cursor: pointer;
        width: min(360px, 92vw);
        aspect-ratio: 360 / 460;
        touch-action: none;
      }
      #controls {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
      }
      select,
      button {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        color: var(--text);
        padding: 7px 14px;
        border-radius: 8px;
        font-size: 13px;
        cursor: pointer;
        font-family: inherit;
        transition: border-color 0.15s, background 0.15s;
        backdrop-filter: blur(4px);
      }
      select:hover, button:hover {
        border-color: var(--accent);
        background: rgba(0,229,255,0.08);
      }
      #restart-btn {
        background: linear-gradient(135deg, #ff4d6d, #c0003a);
        color: #fff;
        font-weight: 700;
        border: none;
        letter-spacing: 0.04em;
      }
      #restart-btn:hover {
        opacity: 0.88;
      }
      /* ── Training panel ── */
      #train-panel {
        width: 100%;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 14px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        backdrop-filter: blur(6px);
      }
      #train-panel h3 {
        font-size: 14px;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: 0.04em;
      }
      .train-row {
        display: flex;
        gap: 8px;
        align-items: center;
        flex-wrap: wrap;
      }
      .train-row label {
        font-size: 12px;
        color: var(--muted);
        min-width: 70px;
      }
      #train-log {
        font-size: 11px;
        color: var(--muted);
        font-family: monospace;
        height: 60px;
        overflow-y: auto;
        background: #050810;
        border-radius: 6px;
        padding: 8px;
        border: 1px solid var(--border);
      }
      #train-progress {
        width: 100%;
        height: 6px;
        background: var(--border);
        border-radius: 3px;
        overflow: hidden;
      }
      #train-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #00e5ff, #ff4d6d);
        border-radius: 3px;
        transition: width 0.1s;
      }
      #voice-log {
        font-size: 12px;
        color: #8899bb;
        font-style: italic;
        text-align: center;
        min-height: 18px;
        padding: 2px 0;
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="spinner"></div>
      <span id="loading-msg">Loading Python...</span>
    </div>
    <div id="top-bar">
      <a id="back-link" href="../index.html">← Back</a
      ><span id="page-title">Tic-Tac-Toe vs AI</span>
    </div>
    <div id="game-wrapper">
      <canvas id="gameCanvas" width="360" height="460"></canvas>
      <div id="voice-log">🔇 Click the board to unlock voice</div>
      <div id="controls">
        <select id="difficulty-select">
          <option value="rookie">Level: Novice</option>
          <option value="easy">Level: Casual</option>
          <option value="even" selected>Level: Balanced</option>
          <option value="hard">Level: Advanced</option>
          <option value="expert">Level: Master</option>
        </select>
        <select id="player-select">
          <option value="1">Go first as X</option>
          <option value="2">Go second as O</option>
        </select>
        <button id="restart-btn">New Round</button>
      </div>

      <!-- Training Panel -->
      <div id="train-panel">
        <h3>🧠 Build Your AI Right Here</h3>
        <div class="train-row">
          <label>Difficulty</label>
          <select id="train-level">
            <option value="rookie">Novice</option>
            <option value="easy">Casual</option>
            <option value="even" selected>Balanced</option>
            <option value="hard">Advanced</option>
            <option value="expert">Master</option>
          </select>
          <label>Rounds</label>
          <select id="train-epochs">
            <option value="500">500</option>
            <option value="1000" selected>1 000</option>
            <option value="3000">3 000</option>
            <option value="5000">5 000</option>
          </select>
          <button id="train-btn">▶ Run</button>
          <button id="export-btn" style="display: none">💾 Export .npy</button>
        </div>
        <div id="train-progress"><div id="train-progress-bar"></div></div>
        <div id="train-log">Pick a difficulty and hit Run to begin.</div>
      </div>
    </div>

    <script type="py" src="tictactoe_core.py"></script>
    <script type="py" src="tictactoe_train.py"></script>
    <script type="py" src="tictactoe.py"></script>
  </body>
</html>
